version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass REPLACE_ME
    ports:
      - "6379:6379"
    networks:
      - path_net
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  master:
    image: quasystellaris/path:latest
    privileged: true
    network_mode: host
    volumes:
      - ./lists:/root/path/lists
      - ./result:/root/path/result
    environment:
      NODE_ROLE: "master"
      REDIS_URL: "redis://127.0.0.1:6379"
      REDIS_PASSWORD: "REPLACE_ME"
      PATH_DNS: 1
      ROUTE_ALL: "n"
      BLOCK_ADS: "y"
      FILTER_CASINO: "y"
      ENABLE_IPV6: "y"
      PUBLIC_DNS: "n"
      AGGREGATE_COUNT: 500
      IP: 10
      EXTERNAL_IP: ""
      FAKE_IP: "198.18"
      FAKE_NETMASK_V4: 15
      FAKE_IP6: "fd00:18::"
      FAKE_NETMASK_V6: 111
      DOH_ENABLE: "n"
      DOH_PORT: 443
      DOH_DOMAIN: ""
      DOH_GENERATE_CERT: "n"
      DOH_CERT: ""
      DOH_KEY: ""
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.settimeout(2); s.connect(('127.0.0.1', 53)); s.send(b'\\x12\\x34\\x01\\x00\\x00\\x01\\x00\\x00\\x00\\x00\\x00\\x00\\x02ya\\x02ru\\x00\\x00\\x01\\x00\\x01'); data = s.recv(512); exit(0 if len(data) > 0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  worker:
    image: quasystellaris/path:latest
    privileged: true
    network_mode: host
    volumes:
      - ./lists:/root/path/lists
      - ./result:/root/path/result
    environment:
      NODE_ROLE: "worker"
      REDIS_URL: "redis://<MASTER_IP>:6379"
      REDIS_PASSWORD: "REPLACE_ME"
      PATH_DNS: 1
      ROUTE_ALL: "n"
      BLOCK_ADS: "y"
      FILTER_CASINO: "y"
      ENABLE_IPV6: "y"
      PUBLIC_DNS: "n"
      AGGREGATE_COUNT: 500
      IP: 10
      EXTERNAL_IP: ""
      FAKE_IP: "198.18"
      FAKE_NETMASK_V4: 15
      FAKE_IP6: "fd00:18::"
      FAKE_NETMASK_V6: 111
      DOH_ENABLE: "n"
      DOH_PORT: 443
      DOH_DOMAIN: ""
      DOH_GENERATE_CERT: "n"
      DOH_CERT: ""
      DOH_KEY: ""
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.settimeout(2); s.connect(('127.0.0.1', 53)); s.send(b'\\x12\\x34\\x01\\x00\\x00\\x01\\x00\\x00\\x00\\x00\\x00\\x00\\x02ya\\x02ru\\x00\\x00\\x01\\x00\\x01'); data = s.recv(512); exit(0 if len(data) > 0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

networks:
  path_net:
    driver: overlay
    attachable: true
