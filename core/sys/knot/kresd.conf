local min_ttl, max_ttl, neg_ttl = 300, 86400, 10800
local instance = os.getenv('SYSTEMD_INSTANCE')
trust_anchors.remove('.')
local dns_var = os.getenv('PATH_DNS') or '1'
local sets = {
    ['1'] = {'62.76.76.62', '62.76.62.76', '193.58.251.251'},
    ['2'] = {'193.58.251.251'},
    ['3'] = {'1.1.1.1', '1.0.0.1', '9.9.9.10', '149.112.112.10'},
    ['4'] = {'83.220.169.155', '212.109.195.93', '195.133.25.16'},
    ['5'] = {'176.99.11.77', '80.78.247.254', '31.192.108.180'},
    ['6'] = {'84.21.189.133', '193.23.209.189'}
}
local upstreams = sets[dns_var] or sets['1']
local alt_zones = policy.todnames({
	'bbs', 'chan', 'cyb', 'dyn', 'epic', 'geek', 'gopher', 'indy', 'libre', 'neo', 'null', 'o', 'oss', 'oz', 'parody', 'pirate', 'opennic.glue',
	'bazar', 'coin', 'emc', 'lib', 'fur', 'ku', 'te', 'ti', 'uu', 'ko', 'rm'
})
local pub, ext, base = os.getenv('PUBLIC_DNS') or 'n', os.getenv('EXTERNAL_IP'), os.getenv('IP') or '10'
local srv = base .. '.77.77.77'
if instance and instance:match('^1') then
	net.listen('127.0.0.1', 53, {kind = 'dns', freebind = true})
	net.listen('::1', 53, {kind = 'dns', freebind = true})
	net.listen(srv, 53, {kind = 'dns', freebind = true})
	if pub == 'y' and ext then net.listen(ext, 53, {kind = 'dns', freebind = true}) end
	local mem = 0
	local f = io.open('/proc/meminfo', 'r')
	if f then for ln in f:lines() do local m = ln:match('MemTotal:%s+(%d+)') if m then mem = tonumber(m) break end end f:close() end
	local csz = math.max(256 * MB, (mem / 1024 / 10) * MB)
	cache.open(csz, 'lmdb:///var/cache/knot-resolver')
elseif instance and instance:match('^2') then
	net.listen('127.0.0.2', 53, {kind = 'dns', freebind = true})
	cache.open(256 * MB, 'lmdb:///var/cache/knot-resolver2')
end
modules = { 'policy', 'view', 'predict', 'serve_stale < cache', 'fallback_tcp' }
local action_deny = policy.ANSWER({
	[kres.type.A]    = { rdata = kres.str2ip('0.0.0.0'), ttl = neg_ttl },
	[kres.type.AAAA] = { rdata = kres.str2ip('::'),      ttl = neg_ttl },
})
if instance and instance:match('^1') then
	policy.add(policy.rpz(action_deny, '/etc/knot-resolver/deny.rpz'))
	policy.add(policy.rpz(policy.STUB('127.0.0.3'), '/etc/knot-resolver/proxy.rpz'))
elseif instance and instance:match('^2') then
	policy.add(policy.rpz(action_deny, '/etc/knot-resolver/deny2.rpz'))
end
policy.add(function (state, query)
	if query.stype == kres.type.HTTPS or query.stype == kres.type.SVCB then
		return policy.ANSWER({[kres.type.SOA] = {rdata = kres.parse_rdata({'SOA . . 1 1 1 1 ' .. neg_ttl}), ttl = neg_ttl}}, true)
	end
end)
for _, item in ipairs(policy.special_names) do policy.add(item.cb) end
if instance and instance:match('^1') then
	policy.add(policy.suffix(policy.FORWARD({'94.247.43.254', '95.216.99.249', '152.53.15.127', '185.226.181.19'}), alt_zones))
	policy.add(policy.all(policy.FORWARD(upstreams)))
elseif instance and instance:match('^2') then
	policy.add(policy.suffix(policy.FORWARD({'94.247.43.254', '95.216.99.249', '152.53.15.127', '185.226.181.19'}), alt_zones))
	policy.add(policy.all(policy.FORWARD({'1.1.1.1', '1.0.0.1', '9.9.9.10', '149.112.112.10'})))
end
net.ipv6 = true
cache.min_ttl(min_ttl)
cache.max_ttl(max_ttl)
cache.ns_tout(1)
modules.unload('refuse_nord')
modules.unload('validate')
modules.unload('ta_update')
modules.unload('ta_signal_query')
modules.unload('ta_sentinel')
modules.unload('detect_time_skew')
modules.unload('extended_error')
modules.unload('priming')
modules.unload('edns_keepalive')
modules.unload('detect_time_jump')
