name: path

services:
  path:
    build: .
    image: quasystellaris/path:latest
    container_name: path
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - ./lists:/root/path/lists
      - ./result:/root/path/result
      - ./download:/root/path/download
    environment:
      # NODE_ROLE: solo | master | worker
      NODE_ROLE: "solo"
      # REDIS_URL: e.g. redis://127.0.0.1:6379
      REDIS_URL: ""
      # REDIS_PASSWORD: required if Redis auth is enabled
      REDIS_PASSWORD: ""
      # PATH_DNS:
      #   1: Cloudflare+Quad9 + MSK-IX+NSDI (recommended, RU-optimized)
      #   2: Cloudflare+Quad9 + SkyDNS (requires SkyDNS account)
      #   3: Cloudflare+Quad9 (fallback if previous choice fails)
      #   4: Comss
      #   5: XBox
      #   6: Malw
      PATH_DNS: 1
      # ROUTE_ALL: y | n (proxy all traffic except exclude-hosts)
      ROUTE_ALL: "n"
      # BLOCK_ADS: y | n (enable adblock RPZ)
      BLOCK_ADS: "y"
      # FILTER_CASINO: y | n (strip gambling domains)
      FILTER_CASINO: "y"
      # ENABLE_IPV6: y | n
      ENABLE_IPV6: "y"
      # PUBLIC_DNS: y | n (listen on external IP)
      PUBLIC_DNS: "n"
      # AGGREGATE_COUNT: target number of IP prefixes in nftables
      AGGREGATE_COUNT: 500
      # IP: base IPv4 prefix for local gateway (e.g., 10 => 10.77.77.77)
      IP: 10
      # EXTERNAL_IP: auto-detected if empty
      EXTERNAL_IP: ""
      # FAKE_IP: IPv4 prefix for Fake-IP pool
      FAKE_IP: "198.18"
      # FAKE_NETMASK_V4: CIDR mask for Fake-IP IPv4 range
      FAKE_NETMASK_V4: 15
      # FAKE_IP6: IPv6 prefix for Fake-IP pool
      FAKE_IP6: "fd00:18::"
      # FAKE_NETMASK_V6: CIDR mask for Fake-IP IPv6 range
      FAKE_NETMASK_V6: 111
      # DOH_ENABLE: y | n (enable DoH)
      DOH_ENABLE: "n"
      # DOH_PORT: HTTPS port for DoH
      DOH_PORT: 443
      # DOH_DOMAIN: domain name for DoH certificate
      DOH_DOMAIN: ""
      # DOH_GENERATE_CERT: y | n (use Certbot)
      DOH_GENERATE_CERT: "n"
      # DOH_CERT: path to SSL certificate
      DOH_CERT: ""
      # DOH_KEY: path to SSL private key
      DOH_KEY: ""
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.settimeout(2); s.connect(('127.0.0.1', 53)); s.send(b'\\x12\\x34\\x01\\x00\\x00\\x01\\x00\\x00\\x00\\x00\\x00\\x00\\x02ya\\x02ru\\x00\\x00\\x01\\x00\\x01'); data = s.recv(512); exit(0 if len(data) > 0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

